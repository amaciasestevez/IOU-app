<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IOU Manager - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div id="login-container" class="bg-white p-8 rounded-xl shadow-lg w-96 w-full max-w-sm">
        
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Welcome to IOU</h1>
        <p class="text-center text-gray-500 mb-6">Please log in or create an account.</p>

        <form id="auth-form" class="flex flex-col space-y-4">
            
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit" id="login-btn" 
                    class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition duration-200 mt-4">
                Log In
            </button>
            
            <a href="register.html" 
                class="w-full bg-gray-200 text-gray-800 font-bold py-2 rounded-lg hover:bg-gray-300 transition duration-200 text-center block">
                Create Account
            </a>
            
        </form>
    </div>
    <script>
        document.getElementById('login-btn').onclick = async function(e) {
            e.preventDefault(); // Prevents the page from refreshing automatically

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if(username.trim() === "" || password.trim() === ""){
                alert("Please fill in all fields before logging in");
                return;
            }

            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();
            if (response.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                window.location.href = '/index.html';
            } else {
                alert(data.message);
            }
        };
    </script>
</body>
</html>
