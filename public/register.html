<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IOU Manager - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Create Account</h1>
        <p class="text-center text-gray-500 mb-6">Join IOU to start managing your debts.</p>

        <form id="register-form" class="flex flex-col space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="reg-email" placeholder="email@example.com"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="reg-username" placeholder="Choose a username"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="reg-password" placeholder="••••••••"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" 
                    class="w-full bg-green-600 text-white font-bold py-2 rounded-lg hover:bg-green-700 transition duration-200 mt-2">
                Sign Up
            </button>
            
            <p class="text-center text-sm text-gray-600 mt-4">
                Already have an account? 
                <a href="login.html" class="text-blue-600 hover:underline font-medium">Log In</a>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('register-form').onsubmit = async function(e) {
            e.preventDefault();

            const email = document.getElementById('reg-email').value;
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;

            if (!email.trim() || !username.trim() || !password.trim()) {
                alert("Please fill out all fields!");
                return;
            }

            const response = await fetch('/api/v1/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, username, password })
            });

            const data = await response.json();

            if (response.ok) {
                alert("Registration successful! Now please log in.");
                window.location.href = 'login.html'; // Send them back to login
            } else {
                alert(data.message || "Registration failed.");
            }
        };
    </script>
</body>
</html>
